<svg width="900" height="650" viewBox="0 0 900 650" xmlns="http://www.w3.org/2000/svg" style="background-color: #0d1117; font-family: 'Courier New', Courier, monospace;">
  <defs>
    <!-- Arrowheads -->
    <marker id="arrowPink" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#ff79c6" />
    </marker>
    <marker id="arrowCyan" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#8be9fd" />
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#50fa7b" />
    </marker>
    <marker id="arrowGray" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#6272a4" />
    </marker>
    <!-- Gradients -->
    <linearGradient id="pinkGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff79c6" stop-opacity="0.2" />
      <stop offset="100%" stop-color="#bd93f9" stop-opacity="0.05" />
    </linearGradient>
    <linearGradient id="cyanGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8be9fd" stop-opacity="0.2" />
      <stop offset="100%" stop-color="#6272a4" stop-opacity="0.05" />
    </linearGradient>
  </defs>

  <!-- Title -->
  <text x="450" y="40" fill="#f8f8f2" font-size="24" font-weight="bold" text-anchor="middle" letter-spacing="2">SMART CODE ARCHITECTURE</text>
  <text x="450" y="65" fill="#6272a4" font-size="14" text-anchor="middle">"Living Repository" &amp; Strangler Fig In-Vivo Replacement</text>

  <!-- Section: Legacy Mainframe -->
  <rect x="50" y="100" width="280" height="480" rx="10" fill="#161b22" stroke="#ff5555" stroke-width="2" stroke-dasharray="5,5"/>
  <text x="190" y="130" fill="#ff5555" font-size="16" font-weight="bold" text-anchor="middle">LEGACY ENVIRONMENT</text>
  <text x="190" y="150" fill="#6272a4" font-size="12" text-anchor="middle">(e.g., 40-year-old COBOL Mainframe)</text>

  <!-- Legacy Component -->
  <rect x="90" y="250" width="200" height="80" rx="5" fill="#282a36" stroke="#ff5555" stroke-width="1"/>
  <text x="190" y="285" fill="#f8f8f2" font-size="14" font-weight="bold" text-anchor="middle">Legacy Component</text>
  <text x="190" y="305" fill="#6272a4" font-size="12" text-anchor="middle">Black Box Logic</text>

  <!-- Section: Smart Repository -->
  <rect x="420" y="100" width="430" height="480" rx="10" fill="#161b22" stroke="#50fa7b" stroke-width="2"/>
  <text x="635" y="130" fill="#50fa7b" font-size="16" font-weight="bold" text-anchor="middle">LIVING REPOSITORY MESH</text>
  <text x="635" y="150" fill="#6272a4" font-size="12" text-anchor="middle">Air-Gapped, Autonomous AI Cluster</text>

  <!-- Custodian Node -->
  <rect x="470" y="180" width="330" height="110" rx="5" fill="url(#pinkGrad)" stroke="#ff79c6" stroke-width="2"/>
  <text x="635" y="210" fill="#ff79c6" font-size="16" font-weight="bold" text-anchor="middle">CUSTODIAN (The Architect)</text>
  <text x="635" y="235" fill="#f8f8f2" font-size="12" text-anchor="middle">e.g., Custodian-Alpha, Custodian-VAux</text>
  <text x="635" y="255" fill="#6272a4" font-size="11" text-anchor="middle">Scope: Audits, Maps, Refactors, Documents</text>
  <text x="635" y="275" fill="#6272a4" font-size="11" text-anchor="middle">Bound entirely to designated directory</text>

  <!-- Executor Node -->
  <rect x="470" y="340" width="330" height="110" rx="5" fill="url(#cyanGrad)" stroke="#8be9fd" stroke-width="2"/>
  <text x="635" y="370" fill="#8be9fd" font-size="16" font-weight="bold" text-anchor="middle">EXECUTOR (The Muscle)</text>
  <text x="635" y="395" fill="#f8f8f2" font-size="12" text-anchor="middle">e.g., Executor-Beta</text>
  <text x="635" y="415" fill="#6272a4" font-size="11" text-anchor="middle">Scope: Runner Proxy, CI/CD, Payload Execution</text>
  <text x="635" y="435" fill="#6272a4" font-size="11" text-anchor="middle">Cross-environment orchestration</text>

  <!-- Bare Metal / Lisp -->
  <rect x="520" y="500" width="230" height="60" rx="5" fill="#282a36" stroke="#f1fa8c" stroke-width="1"/>
  <text x="635" y="525" fill="#f1fa8c" font-size="14" font-weight="bold" text-anchor="middle">Bare Metal Runtime</text>
  <text x="635" y="545" fill="#6272a4" font-size="12" text-anchor="middle">(Lisp `eval`, File I/O)</text>

  <!-- Connections & Flow -->
  <!-- Audit flow -->
  <path d="M 470 235 L 290 235 L 290 250" fill="none" stroke="#ff79c6" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#arrowPink)"/>
  <text x="380" y="225" fill="#ff79c6" font-size="11" text-anchor="middle">1. Autopsy / Map</text>

  <!-- Mesh Comm -->
  <path d="M 600 290 L 600 340" fill="none" stroke="#bd93f9" stroke-width="2" marker-end="url(#arrowCyan)"/>
  <path d="M 670 340 L 670 290" fill="none" stroke="#bd93f9" stroke-width="2" marker-end="url(#arrowPink)"/>
  <text x="735" y="320" fill="#bd93f9" font-size="11" text-anchor="middle">AI Mesh Sync</text>

  <!-- Mimicry flow -->
  <path d="M 290 310 L 290 395 L 470 395" fill="none" stroke="#8be9fd" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#arrowCyan)"/>
  <text x="380" y="385" fill="#8be9fd" font-size="11" text-anchor="middle">2. Observe &amp; Mimic</text>

  <!-- Bare Metal Execution -->
  <path d="M 635 450 L 635 500" fill="none" stroke="#f1fa8c" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <text x="690" y="480" fill="#f1fa8c" font-size="11" text-anchor="middle">3. Execute Payload</text>

  <!-- The Strangler Fig Proxy / Cut Wire -->
  <circle cx="360" cy="285" r="25" fill="#282a36" stroke="#ffb86c" stroke-width="3"/>
  <text x="360" y="290" fill="#ffb86c" font-size="18" font-weight="bold" text-anchor="middle">X</text>
  <text x="360" y="330" fill="#ffb86c" font-size="12" text-anchor="middle">Strangler Proxy</text>
  <text x="360" y="345" fill="#ffb86c" font-size="10" text-anchor="middle">(The "Cut Wire")</text>

</svg>
