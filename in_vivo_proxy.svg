<svg width="900" height="650" viewBox="0 0 900 650" xmlns="http://www.w3.org/2000/svg" style="background-color: #0d1117; font-family: 'Courier New', Courier, monospace;">
  <defs>
    <!-- Arrowheads -->
    <marker id="arrowNeon" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#50fa7b" />
    </marker>
    <marker id="arrowCyan" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#8be9fd" />
    </marker>
    <marker id="arrowGray" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#6272a4" />
    </marker>
  </defs>

  <!-- Title -->
  <text x="450" y="40" fill="#f8f8f2" font-size="24" font-weight="bold" text-anchor="middle" letter-spacing="2">MULTI-NODE IN-VIVO MESH</text>
  <text x="450" y="65" fill="#6272a4" font-size="14" text-anchor="middle">Enterprise Scale: Distributed Strangler Fig Proxies</text>

  <!-- Central Router / Mainframe -->
  <rect x="250" y="100" width="400" height="80" rx="10" fill="#282a36" stroke="#bd93f9" stroke-width="3"/>
  <text x="450" y="145" fill="#bd93f9" font-size="20" font-weight="bold" text-anchor="middle">ENTERPRISE GATEWAY / MAINFRAME</text>

  <!-- Connections from Gateway to Proxies -->
  <path d="M 300 180 L 150 250" fill="none" stroke="#8be9fd" stroke-width="3" marker-end="url(#arrowCyan)"/>
  <path d="M 450 180 L 450 250" fill="none" stroke="#50fa7b" stroke-width="3" marker-end="url(#arrowNeon)"/>
  <path d="M 600 180 L 750 250" fill="none" stroke="#8be9fd" stroke-width="3" marker-end="url(#arrowCyan)"/>

  <!-- PROXY A (Mimicry Phase) -->
  <rect x="50" y="250" width="200" height="90" rx="5" fill="#161b22" stroke="#8be9fd" stroke-width="2"/>
  <text x="150" y="280" fill="#8be9fd" font-size="16" font-weight="bold" text-anchor="middle">PROXY NODE A</text>
  <text x="150" y="300" fill="#f8f8f2" font-size="12" text-anchor="middle">(Mimicry Phase)</text>
  <text x="150" y="320" fill="#6272a4" font-size="11" text-anchor="middle">Learning I/O</text>

  <!-- PROXY B (Severance Phase - Active) -->
  <rect x="350" y="250" width="200" height="90" rx="5" fill="#161b22" stroke="#50fa7b" stroke-width="3"/>
  <text x="450" y="280" fill="#50fa7b" font-size="16" font-weight="bold" text-anchor="middle">PROXY NODE B</text>
  <text x="450" y="300" fill="#f8f8f2" font-size="12" text-anchor="middle">(Severance Complete)</text>
  <text x="450" y="320" fill="#f1fa8c" font-size="11" text-anchor="middle">Fully Autonomous</text>

  <!-- PROXY C (Mimicry Phase) -->
  <rect x="650" y="250" width="200" height="90" rx="5" fill="#161b22" stroke="#8be9fd" stroke-width="2"/>
  <text x="750" y="280" fill="#8be9fd" font-size="16" font-weight="bold" text-anchor="middle">PROXY NODE C</text>
  <text x="750" y="300" fill="#f8f8f2" font-size="12" text-anchor="middle">(Mimicry Phase)</text>
  <text x="750" y="320" fill="#6272a4" font-size="11" text-anchor="middle">Learning I/O</text>

  <!-- Connections from Proxies to Legacy -->
  <path d="M 150 340 L 150 450" fill="none" stroke="#ff79c6" stroke-width="2" stroke-dasharray="5,5" marker-end="url(#arrowGray)"/>
  <path d="M 750 340 L 750 450" fill="none" stroke="#ff79c6" stroke-width="2" stroke-dasharray="5,5" marker-end="url(#arrowGray)"/>

  <!-- Cut Wire for Proxy B -->
  <path d="M 450 340 L 450 380" fill="none" stroke="#6272a4" stroke-width="2" stroke-dasharray="2,4"/>
  <text x="450" y="405" fill="#ff5555" font-size="24" font-weight="bold" text-anchor="middle">X</text>
  <text x="450" y="425" fill="#ff5555" font-size="12" text-anchor="middle">Legacy Severed</text>

  <!-- LEGACY A -->
  <rect x="50" y="450" width="200" height="70" rx="5" fill="#282a36" stroke="#ff5555" stroke-width="1"/>
  <text x="150" y="485" fill="#ff5555" font-size="14" font-weight="bold" text-anchor="middle">Legacy Comp A</text>
  <text x="150" y="505" fill="#6272a4" font-size="11" text-anchor="middle">Being mapped in vivo</text>

  <!-- LEGACY B (Dead) -->
  <rect x="350" y="450" width="200" height="70" rx="5" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="450" y="485" fill="#444" font-size="14" font-weight="bold" text-anchor="middle">Legacy Comp B</text>
  <text x="450" y="505" fill="#444" font-size="11" text-anchor="middle">Deprecated &amp; Offline</text>

  <!-- LEGACY C -->
  <rect x="650" y="450" width="200" height="70" rx="5" fill="#282a36" stroke="#ff5555" stroke-width="1"/>
  <text x="750" y="485" fill="#ff5555" font-size="14" font-weight="bold" text-anchor="middle">Legacy Comp C</text>
  <text x="750" y="505" fill="#6272a4" font-size="11" text-anchor="middle">Being mapped in vivo</text>

  <!-- Mesh Network Comms (Horizontal sync between proxies) -->
  <path d="M 250 295 L 350 295" fill="none" stroke="#bd93f9" stroke-width="1" stroke-dasharray="3,3"/>
  <path d="M 550 295 L 650 295" fill="none" stroke="#bd93f9" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="300" y="285" fill="#bd93f9" font-size="10" text-anchor="middle">Mesh Sync</text>
  <text x="600" y="285" fill="#bd93f9" font-size="10" text-anchor="middle">Mesh Sync</text>

  <!-- Legend -->
  <rect x="250" y="560" width="400" height="70" rx="5" fill="#161b22" stroke="#6272a4" stroke-width="1"/>
  <text x="450" y="580" fill="#f8f8f2" font-size="12" font-weight="bold" text-anchor="middle">ARCHITECTURE LEGEND</text>
  <text x="320" y="605" fill="#8be9fd" font-size="11" text-anchor="middle">■ Mimicry Routing</text>
  <text x="450" y="605" fill="#50fa7b" font-size="11" text-anchor="middle">■ Native AI Execution</text>
  <text x="580" y="605" fill="#ff79c6" font-size="11" text-anchor="middle">■ Legacy Bleed-off</text>

</svg>
